  var TYPE_COLORS = {
    "Research": "#00356b",
    "Education": "#BD9B60",
    "Capacity Building": "#5C8374",
    "FINGERS Study": "#8B5A3C"
  };

  var TYPE_BADGE_CLASS = {
    "Research": "ysn-badge-research",
    "Education": "ysn-badge-education",
    "Capacity Building": "ysn-badge-capacity",
    "FINGERS Study": "ysn-badge-fingers"
  };

  function escapeHtml(s) {
    if (s === null || s === undefined) return "";
    return String(s)
      .replace(new RegExp("&", "g"), "&amp;")
      .replace(new RegExp("\u003C", "g"), "&lt;")
      .replace(new RegExp("\u003E", "g"), "&gt;")
      .replace(new RegExp("\"", "g"), "&quot;")
      .replace(new RegExp("'", "g"), "&#39;");
  }

  function makePinIcon(type) {
    var color = TYPE_COLORS[type] || "#4a4a4a";
    var html = '\u003Cdiv class="ysn-pin" style="background:' + color + '"\u003E\u003Cdiv class="ysn-pin-inner"\u003E\u003C/div\u003E\u003C/div\u003E';
    return L.divIcon({
      html: html,
      className: "ysn-pin-wrap",
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -14]
    });
  }

  function avatarHTML(rec) {
    if (rec.headshot) {
      var safeUrl = escapeHtml(rec.headshot);
      var safeInit = escapeHtml(rec.initials);
      return '\u003Cimg src="' + safeUrl + '" alt="" onerror="this.style.display=\'none\'; this.parentNode.innerHTML=\'' + safeInit + '\';"\u003E';
    }
    return escapeHtml(rec.initials);
  }

  function buildPopup(rec) {
    var badgeClass = TYPE_BADGE_CLASS[rec.activityType] || "ysn-badge-research";
    var statusClass = rec.status === "Active" ? "ysn-badge-active" : "ysn-badge-archived";

    var dateStr = "";
    if (rec.startDate && rec.endDate) dateStr = rec.startDate + " - " + rec.endDate;
    else if (rec.startDate) dateStr = rec.startDate;
    else if (rec.endDate) dateStr = rec.endDate;

    var themesHtml = "";
    if (rec.themes && rec.themes.length) {
      themesHtml = '\u003Cdiv class="ysn-popup-themes"\u003E' +
        rec.themes.map(function (t) {
          return '\u003Cspan class="ysn-theme-chip"\u003E' + escapeHtml(t) + '\u003C/span\u003E';
        }).join("") + '\u003C/div\u003E';
    }

    var profileLink = "";
    if (rec.profile) {
      profileLink = '\u003Ca href="' + escapeHtml(rec.profile) + '" target="_blank" rel="noopener" class="ysn-popup-link"\u003EView faculty profile\u003C/a\u003E';
    }

    var locationStr = [rec.city, rec.country].filter(Boolean).join(", ");

    var partnerRow = rec.partner ?
      '\u003Cdiv class="ysn-popup-meta-row"\u003E\u003Cspan class="ysn-popup-meta-label"\u003EPartner\u003C/span\u003E' + escapeHtml(rec.partner) + '\u003C/div\u003E' : '';
    var locationRow = locationStr ?
      '\u003Cdiv class="ysn-popup-meta-row"\u003E\u003Cspan class="ysn-popup-meta-label"\u003ELocation\u003C/span\u003E' + escapeHtml(locationStr) + '\u003C/div\u003E' : '';
    var dateRow = dateStr ?
      '\u003Cdiv class="ysn-popup-meta-row"\u003E\u003Cspan class="ysn-popup-meta-label"\u003EDates\u003C/span\u003E' + escapeHtml(dateStr) + '\u003C/div\u003E' : '';

    var descHtml = rec.description ?
      '\u003Cdiv class="ysn-popup-desc"\u003E' + escapeHtml(rec.description).replace(new RegExp("\\n", "g"), "\u003Cbr\u003E") + '\u003C/div\u003E' : '';

    return '\u003Cdiv class="ysn-popup"\u003E' +
      '\u003Cdiv class="ysn-popup-faculty"\u003E' +
        '\u003Cdiv class="ysn-popup-avatar"\u003E' + avatarHTML(rec) + '\u003C/div\u003E' +
        '\u003Cdiv class="ysn-popup-faculty-meta"\u003E' +
          '\u003Cdiv class="ysn-popup-faculty-name"\u003E' + escapeHtml(rec.faculty) + '\u003C/div\u003E' +
          '\u003Cdiv class="ysn-popup-faculty-role"\u003E' + escapeHtml(rec.role) + '\u003C/div\u003E' +
        '\u003C/div\u003E' +
      '\u003C/div\u003E' +
      '\u003Cdiv class="ysn-popup-body"\u003E' +
        '\u003Cdiv class="ysn-popup-title"\u003E' + escapeHtml(rec.activityName) + '\u003C/div\u003E' +
        '\u003Cdiv class="ysn-popup-badges"\u003E' +
          '\u003Cspan class="ysn-badge ' + badgeClass + '"\u003E' + escapeHtml(rec.activityType) + '\u003C/span\u003E' +
          '\u003Cspan class="ysn-badge ' + statusClass + '"\u003E' + escapeHtml(rec.status) + '\u003C/span\u003E' +
        '\u003C/div\u003E' +
        themesHtml +
        '\u003Cdiv class="ysn-popup-meta"\u003E' +
          partnerRow + locationRow + dateRow +
        '\u003C/div\u003E' +
        descHtml +
        profileLink +
      '\u003C/div\u003E' +
    '\u003C/div\u003E';
  }

  // Initialize map
  var map = L.map("ysn-map", {
    center: [20, 10],
    zoom: 2,
    minZoom: 2,
    worldCopyJump: true,
    zoomControl: true,
    scrollWheelZoom: false
  });

  // Allow scroll-wheel zoom only when map has focus
  map.on("focus", function () { map.scrollWheelZoom.enable(); });
  map.on("blur", function () { map.scrollWheelZoom.disable(); });
  map.getContainer().addEventListener("click", function () { map.scrollWheelZoom.enable(); });

  // Carto Positron tiles - clean, neutral basemap
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution: "&copy; \u003Ca href=\"https://www.openstreetmap.org/copyright\"\u003EOpenStreetMap\u003C/a\u003E &copy; \u003Ca href=\"https://carto.com/attributions\"\u003ECARTO\u003C/a\u003E",
    subdomains: "abcd",
    maxZoom: 19
  }).addTo(map);

  var cluster = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: function (c) {
      var count = c.getChildCount();
      var size = count < 10 ? 36 : count < 30 ? 44 : 52;
      return L.divIcon({
        html: '\u003Cdiv\u003E\u003Cspan\u003E' + count + '\u003C/span\u003E\u003C/div\u003E',
        className: "marker-cluster marker-cluster-" + (count < 10 ? "small" : count < 30 ? "medium" : "large"),
        iconSize: L.point(size, size)
      });
    }
  });
  map.addLayer(cluster);

  // Build markers
  var allMarkers = [];
  DATA.forEach(function (rec) {
    var m = L.marker([rec.lat, rec.lng], { icon: makePinIcon(rec.activityType) });
    m.bindPopup(buildPopup(rec), { maxWidth: 360, minWidth: 340 });
    m._ysnRec = rec;
    allMarkers.push(m);
  });

  // Filter state
  var filters = {
    type: new Set(),
    status: new Set(),
    country: new Set()
  };

  function updateMarkers() {
    cluster.clearLayers();
    var visible = allMarkers.filter(function (m) {
      var r = m._ysnRec;
      if (filters.type.size && !filters.type.has(r.activityType)) return false;
      if (filters.status.size && !filters.status.has(r.status)) return false;
      if (filters.country.size && !filters.country.has(r.country)) return false;
      return true;
    });
    cluster.addLayers(visible);
    document.getElementById("ysn-count-visible").textContent = visible.length;
  }

  // Build filter UI
  function counts(field) {
    var c = {};
    DATA.forEach(function (r) {
      var v = r[field] || "Unknown";
      c[v] = (c[v] || 0) + 1;
    });
    return c;
  }

  function buildCheckboxes(containerId, field, values, filterKey) {
    var container = document.getElementById(containerId);
    var c = counts(field);
    values.forEach(function (v) {
      var row = document.createElement("label");
      row.className = "ysn-check-row";
      row.innerHTML =
        '\u003Cinput type="checkbox" value="' + escapeHtml(v) + '"\u003E' +
        '\u003Cspan\u003E' + escapeHtml(v) + '\u003C/span\u003E' +
        '\u003Cspan class="ysn-check-count"\u003E' + (c[v] || 0) + '\u003C/span\u003E';
      var cb = row.querySelector("input");
      cb.addEventListener("change", function () {
        if (cb.checked) filters[filterKey].add(v);
        else filters[filterKey].delete(v);
        updateMarkers();
      });
      container.appendChild(row);
    });
  }

  var typeValues = Object.keys(counts("activityType")).sort();
  var statusValues = Object.keys(counts("status")).sort();
  var countryValues = Object.keys(counts("country")).filter(Boolean).sort();

  buildCheckboxes("ysn-filter-type", "activityType", typeValues, "type");
  buildCheckboxes("ysn-filter-status", "status", statusValues, "status");
  buildCheckboxes("ysn-filter-country", "country", countryValues, "country");

  // Country search filter
  var countrySearch = document.getElementById("ysn-country-search");
  countrySearch.addEventListener("input", function () {
    var q = countrySearch.value.trim().toLowerCase();
    var rows = document.querySelectorAll("#ysn-filter-country .ysn-check-row");
    rows.forEach(function (row) {
      var label = row.textContent.toLowerCase();
      row.style.display = (!q || label.indexOf(q) >= 0) ? "" : "none";
    });
  });

  // Reset button
  document.getElementById("ysn-clear-btn").addEventListener("click", function () {
    filters.type.clear();
    filters.status.clear();
    filters.country.clear();
    document.querySelectorAll(".ysn-filters input[type=\"checkbox\"]").forEach(function (cb) {
      cb.checked = false;
    });
    countrySearch.value = "";
    document.querySelectorAll("#ysn-filter-country .ysn-check-row").forEach(function (row) {
      row.style.display = "";
    });
    updateMarkers();
  });

  // Set totals
  document.getElementById("ysn-count-total").textContent = DATA.length;
  document.getElementById("ysn-count-visible").textContent = DATA.length;

  // Initial render
  updateMarkers();
})();/*]]>*/</script></div></div></div></div></body></html>
